<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TB-303 v8.2 - Soundbanks</title>
<style>
  body {
    background: #1a1a;

    color: #ddd;
    display: flex;
    justify-content: center;
    padding: 20px;
    margin: 0;
  }
.tb303 {
    background: linear-gradient(#c8c8c0, #a8a89e);
    width: 980px;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,.6), inset 0 1px 0 #fff6;
    border: 3px solid #333;
  }
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    color: #111;
  }
.logo { font-weight: 900; font-size: 28px; letter-spacing: 1px; }
.logo span { font-weight: 400; font-size: 14px; margin-left: 8px; }

.controls {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 12px;
    margin-bottom: 15px;
    background: #222;
    padding: 15px;
    border-radius: 4px;
  }
.knob-group {
    text-align: center;
  }
.knob-group label {
    display: block;
    font-size: 11px;
    color: #ccc;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  input[type=range] {
    width: 100%;
    accent-color: #ff4500;
  }
.value {
    font-size: 10px;
    color: #ff4500;
    margin-top: 4px;
  }

.switch-row {
    display: flex;
    gap: 15px;
    align-items: center;
    background: #222;
    padding: 12px 15px;
    border-radius: 4px;
    margin-bottom: 15px;
    flex-wrap: wrap;
  }
.switch {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    text-transform: uppercase;
  }
  button {
    background: #444;
    border: 1px solid #111;
    color: #eee;
    padding: 8px 16px;
    border-radius: 3px;
    cursor: pointer;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 12px;
  }
  button:hover { background: #555; }
  button.active { background: #ff4500; color: #111; }
  button.download { background: #0a5; color: #fff; }
  button.download:hover { background: #0c7; }
  button.small { padding: 4px 8px; font-size: 10px; }
  select {
    background: #111;
    color: #ff4500;
    border: 1px solid #444;
    padding: 6px 10px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
  }

.soundbank-bar {
    background: #1a1a1a;
    padding: 12px 15px;
    border-radius: 4px;
    margin-bottom: 15px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    border: 1px solid #333;
  }
.soundbank-bar label {
    font-size: 11px;
    color: #ff4500;
    text-transform: uppercase;
    font-weight: 700;
  }
.soundbank-bar select {
    min-width: 160px;
  }
.soundbank-bar input {
    background: #111;
    color: #eee;
    border: 1px solid #444;
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 11px;
  }

.sequencer {
    background: #222;
    padding: 15px;
    border-radius: 4px;
  }
.steps {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 4px;
    margin-bottom: 10px;
  }
.step {
    background: #111;
    border: 1px solid #333;
    padding: 6px 2px;
    text-align: center;
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
.step.active { background: #ff4500; color: #111; }
.step.playing { box-shadow: 0 0 8px #ff4500; }
.step select {
    width: 100%;
    background: #000;
    color: #0f0;
    border: 1px solid #333;
    font-size: 11px;
    text-align: center;
  }
.step-controls {
    display: flex;
    justify-content: space-around;
    align-items: center;
    gap: 2px;
  }
.step-btn {
    background: #333;
    border: 1px solid #555;
    color: #ccc;
    font-size: 9px;
    padding: 2px 4px;
    border-radius: 2px;
    cursor: pointer;
    line-height: 1;
    min-width: 18px;
  }
.step-btn:hover { background: #444; }
.step-btn.active { background: #ff4500; color: #111; border-color: #ff4500; }
.oct-indicator {
    font-size: 8px;
    color: #ff4500;
    font-weight: 700;
  }
.step-labels {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 4px;
    font-size: 9px;
    text-align: center;
    color: #888;
    margin-bottom: 5px;
  }
.led-row {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 4px;
    margin-bottom: 5px;
  }
.led {
    height: 6px;
    background: #300;
    border-radius: 3px;
  }
.led.on { background: #f00; box-shadow: 0 0 6px #f00; }
</style>
</head>

let currentBank = 'Factory Transistor Bass';
let currentPattern = 'TB Bassline 1';

}

function refreshBankSelect() {
  const bankSel = document.getElementById('bankSelect');
  bankSel.innerHTML = '';
  Object.keys(soundbanks).forEach(bank => {
    const opt = document.createElement('option');
    opt.value = bank;
    opt.textContent = bank;
    bankSel.appendChild(opt);
  });
  bankSel.value = currentBank;
  refreshPatternSelect();
}

function refreshPatternSelect() {
  const patSel = document.getElementById('patternSelect');
  patSel.innerHTML = '';
  Object.keys(soundbanks[currentBank] || {}).forEach(pat => {
    const opt = document.createElement('option');
    opt.value = pat;
    opt.textContent = pat;
    patSel.appendChild(opt);
  });
  if(soundbanks[currentBank] && soundbanks[currentBank][currentPattern]) {
    patSel.value = currentPattern;
  } else if(patSel.options.length > 0) {
    currentPattern = patSel.options[0].value;
  }
}

function loadPattern() {
  const pattern = soundbanks[currentBank]?.[currentPattern];
  if(!pattern) return;
  pattern.forEach((step, i) => {
    seq[i] = {note: step.n, octave: step.o, slide: step.s, accent: step.a};
  });
  updateStepUI();
}

function saveCurrentPattern() {
  const name = document.getElementById('patternNameInput').value.trim();
  if(!name) { alert('Ingresa un nombre'); return; }
  if(!soundbanks['User']) soundbanks['User'] = {};
  soundbanks['User'][name] = seq.map(s => ({n:s.note, o:s.octave, s:s.slide, a:s.accent}));
  saveSoundbanks();
  currentBank = 'User';
  currentPattern = name;
  refreshBankSelect();
  document.getElementById('patternNameInput').value = '';
}

// REVERB ACID V
let reverbNode = null;
let reverbHPF = null;
let reverbLPF = null;
let reverbGain = null;

async function createAcidVReverb() {
  reverbNode = ctx.createConvolver();
  reverbHPF = ctx.createBiquadFilter();
  reverbLPF = ctx.createBiquadFilter();
  reverbGain = ctx.createGain();

  reverbHPF.type = 'highpass';
  reverbHPF.frequency.value = 300;
  reverbHPF.Q.value = 0.7;

  reverbLPF.type = 'lowpass';
  reverbLPF.frequency.value = 4000;
  reverbLPF.Q.value = 0.7;

  const sampleRate = ctx.sampleRate;
  const length = sampleRate * 2.5;
  const impulse = ctx.createBuffer(2, length, sampleRate);

  for(let ch = 0; ch < 2; ch++) {
    const channel = impulse.getChannelData(ch);
    for(let i = 0; i < length; i++) {
      const t = i / sampleRate;
      const decay = Math.pow(1 - t / 2.5, 3);
      channel[i] = (Math.random() * 2 - 1) * decay * 0.5;
    }
  }
  reverbNode.buffer = impulse;

  reverbHPF.connect(reverbNode);
  reverbNode.connect(reverbLPF);
  reverbLPF.connect(reverbGain);
  reverbGain.connect(ctx.destination);
}

  const scale = document.getElementById('scaleSelect').value;
  const genre = document.getElementById('genreSelect').value;
  const density = params.density / 100;
  const root = parseInt(document.getElementById('rootSelect').value);
  generatePattern(scale, genre, density, root);
};

function generatePattern(scaleName, genre, density, rootOffset) {
  const scale = scales[scaleName];
  seq.forEach(s => {s.note='OFF'; s.octave=2; s.slide=false; s.accent=false;});

  const scaleNotes = scale.map(interval => {
    const noteIndex = (rootOffset + interval) % 12;
    return allNotes[noteIndex] + '2';
  });

  switch(genre) {
    case 'brejcha': generateBorisBrejcha(scaleNotes, density); break;
    case 'amelie': generateAmelieLens(scaleNotes, density); break;
    case 'hozho': generateHozho(scaleNotes, density); break;
    case 'claptone': generateClaptone(scaleNotes, density); break;
    case 'deadmau5': generateDeadmau5(scaleNotes, density); break;
    case 'dashberlin': generateDashBerlin(scaleNotes, density); break;
    case 'techhouse': generateTechHouse(scaleNotes, density); break;
    case 'melodictechno': generateMelodicTechno(scaleNotes, density); break;
    case 'detroit': generateDetroitTechno(scaleNotes, density); break;
    case 'berlin': generateBerlinTechno(scaleNotes, density); break;
    case 'uplifting': generateUpliftingTrance(scaleNotes, density); break;
    case 'psytrance': generatePsytrance(scaleNotes, density); break;
    case 'house': generateHouse(scaleNotes, density); break;
    case 'dnb': generateDrumAndBass(scaleNotes, density); break;
    case 'acid': generateAcidClassic(scaleNotes, density); break;
  }
  updateStepUI();
}

function generateBorisBrejcha(scaleNotes, density) {
  const pattern = [2,4,7,10,13,15];
  const root = scaleNotes[0], fifth = scaleNotes[4] || scaleNotes[0], second = scaleNotes[1] || root;
  pattern.forEach(i => {
    if(Math.random() < density * 1.15) {
      const r = Math.random();
      seq[i].note = r < 0.55? root : r < 0.85? fifth : second;
      seq[i].octave = Math.random() < 0.75? 2 : 1;
      seq[i].accent = [2,10].includes(i) || Math.random() < 0.55;
      seq[i].slide = Math.random() < 0.4 && i > 0;
    }
  });
  if(Math.random() < density) { seq[3].note = second; seq[3].octave = 2; seq[3].accent = true; }
}

function generateAmelieLens(scaleNotes, density) {
  const pattern = [0,4,8,12];
  const root = scaleNotes[0], seventh = scaleNotes[scaleNotes.length-1];
  pattern.forEach(i => {
    if(Math.random() < density * 1.2) {
      seq[i].note = Math.random() < 0.8? root : seventh;
      seq[i].octave = 1;
      seq[i].accent = true;
      seq[i].slide = false;
    }
  });
  [2,6,10,14].forEach(i => {
    if(Math.random() < density * 0.4) { seq[i].note = root; seq[i].octave = 1; }
  });
}

function generateHozho(scaleNotes, density) {
  const progression = [0, 4, 2, 4];
  for(let i=0; i<16; i++) {
    if(Math.random() < density * 0.9) {
      const progStep = Math.floor(i/4) % 4;
      seq[i].note = scaleNotes[progression[progStep] % scaleNotes.length];
      seq[i].octave = i%8 < 4? 2 : 3;
      seq[i].accent = i%4 === 0;
      seq[i].slide = Math.random() < 0.6 && i > 0;
    }
  }
}

function generateClaptone(scaleNotes, density) {
  const groove = [1,3,6,9,11,14];
  groove.forEach(i => {
    if(Math.random() < density) {
      seq[i].note = scaleNotes[Math.floor(Math.random() * 4)];
      seq[i].octave = 2;
      seq[i].accent = [1,9].includes(i);
      seq[i].slide = Math.random() < 0.3;
    }
  });
}

function generateDeadmau5(scaleNotes, density) {
  const arp = [0,2,4,7,4,2,0,4];
  for(let i=0; i<16; i++) {
    if(Math.random() < density * 1.1) {
      seq[i].note = scaleNotes[arp[i%8] % scaleNotes.length];
      seq[i].octave = i < 8? 2 : 3;
      seq[i].accent = i%8 === 0;
      seq[i].slide = true;
    }
  }
}

function generateDashBerlin(scaleNotes, density) {
  const arp = [0,2,4,7,9,7];
  for(let i=0; i<16; i++) {
    if(Math.random() < density) {
      seq[i].note = scaleNotes[arp[i%8] % scaleNotes.length];
      seq[i].octave = i < 8? 2 : 3;
      seq[i].accent = i%4 === 0;
      seq[i].slide = Math.random() < 0.25;
    }
  }
}

function generateTechHouse(scaleNotes, density) {
  const groove = [0,3,4,7,10,12,15];
  groove.forEach(i => {
    if(Math.random() < density * 1.2) {
      seq[i].note = scaleNotes[Math.floor(Math.random() * scaleNotes.length)];
      seq[i].octave = 2;
      seq[i].accent = [0,4,8,12].includes(i);
      seq[i].slide = Math.random() < 0.2;
    }
  });
}

function generateMelodicTechno(scaleNotes, density) {
  const progression = [0, 2, 4, 2];
  for(let i=0; i<16; i++) {
    if(Math.random() < density) {
      const progStep = Math.floor(i/4) % 4;
      seq[i].note = scaleNotes[progression[progStep] % scaleNotes.length];
      seq[i].octave = i%8 < 4? 2 : 3;
      seq[i].accent = i%4 === 0 || Math.random() < 0.2;
      seq[i].slide = Math.random() < 0.3;
    }
  }
}

function generateDetroitTechno(scaleNotes, density) {
  const chord = [0,2,4,6];
  [0,4,8,12].forEach(i => {
    if(Math.random() < density) {
      seq[i].note = scaleNotes[chord[Math.floor(i/4)%4] % scaleNotes.length];
      seq[i].octave = 2;
      seq[i].accent = true;
      seq[i].slide = false;
    }
  });
  [2,6,10,14].forEach(i => {
    if(Math.random() < density * 0.5) {
      seq[i].note = scaleNotes[0];
      seq[i].octave = 1;
    }
  });
}

function generateBerlinTechno(scaleNotes, density) {
  const root = scaleNotes[0];
  [0,2,4,6,8,10,12,14].forEach(i => {
    if(Math.random() < density * 0.8) {
      seq[i].note = root;
      seq[i].octave = 1;
      seq[i].accent = i%4 === 0;
      seq[i].slide = false;
    }
  });
}

function generateUpliftingTrance(scaleNotes, density) {
  const arp = [0,2,4,7,9,7,4,2];
  for(let i=0; i<16; i++) {
    if(Math.random() < density * 1.1) {
      seq[i].note = scaleNotes[arp[i%8] % scaleNotes.length];
      seq[i].octave = 3;
      seq[i].accent = i%4 === 0;
      seq[i].slide = false;
    }
  }
}

function generatePsytrance(scaleNotes, density) {
  const root = scaleNotes[0], third = scaleNotes[2] || scaleNotes[1];
  for(let i=0; i<16; i++) {
    if(Math.random() < density * 0.9) {
      seq[i].note = i%3 === 0? third : root;
      seq[i].octave = 1;
      seq[i].accent = i%4 === 0;
      seq[i].slide = Math.random() < 0.8;
    }
  }
}

function generateHouse(scaleNotes, density) {
  const groove = [0,2,4,6,8,10,12,14];
  const seventh = scaleNotes[6] || scaleNotes[scaleNotes.length-1];
  groove.forEach(i => {
    if(Math.random() < density) {
      seq[i].note = i%4 === 0? scaleNotes[0] : seventh;
      seq[i].octave = 2;
      seq[i].accent = [0,8].includes(i);
      seq[i].slide = Math.random() < 0.2;
    }
  });
}

function generateDrumAndBass(scaleNotes, density) {
  const dnbPattern = [0,3,6,9,12,15];
  const root = scaleNotes[0], third = scaleNotes[2] || scaleNotes[1];
  dnbPattern.forEach(i => {
    if(Math.random() < density) {
      seq[i].note = Math.random() < 0.7? root : third;
      seq[i].octave = 1;
      seq[i].accent = [0,9].includes(i);
      seq[i].slide = Math.random() < 0.7;
    }
  });
  [2,5,8,11,14].forEach(i => {
    if(Math.random() < density * 0.5) {
      seq[i].note = root;
      seq[i].octave = 2;
      seq[i].slide = true;
    }
  });
}

function generateAcidClassic(scaleNotes, density) {
  const root = scaleNotes[0], fifth = scaleNotes[4] || scaleNotes[0];
  for(let i=0; i<16; i++) {
    if(Math.random() < density) {
      seq[i].note = Math.random() < 0.6? root : fifth;
      seq[i].octave = Math.random() < 0.3? 1 : 2;
      seq[i].accent = Math.random() < 0.4;
      seq[i].slide = Math.random() < 0.6 && i > 0;
    }
  }
}

function updateStepUI() {
  seq.forEach((s, i) => {
    document.querySelector(`select[data-step="${i}"]`).value = s.note;
    document.getElementById(`oct-${i}`).textContent = s.octave;

}

function getStepFreq(step) {
  if(step.note === 'OFF') return null;
  let baseNote = step.note;
  if(step.octave === 1) baseNote = step.note.replace('2','1');
  if(step.octave === 3) baseNote = step.note.replace('2','3');
  return noteFreq[baseNote];
}

// MOTOR TRANSISTOR BASS: Cutoff 0-100, Res 0-100, Drive pre-filtro + Reverb Acid V
let lastFreq = 65.41;
let reverbSend = null;

function initReverb() {
  if(reverbSend) return;
  reverbSend = ctx.createGain();
  reverbSend.gain.value = params.reverb / 100;
  reverbSend.connect(reverbHPF);
}

function create303Voice(freq, time, slide, accent, duration) {
  const osc = ctx.createOscillator();
  const filter = ctx.createBiquadFilter();
  const vca = ctx.createGain();
  const driveNode = ctx.createWaveShaper();
  const distNode = ctx.createWaveShaper();

  osc.type = waveform;
  osc.frequency.value = freq * Math.pow(2, params.tune/12);

  // 1. DRIVE TRANSISTOR BASS: saturación pre-filtro 0-100
  if(params.drive > 0) {
    const k = params.drive / 100 * 100;
    const curve = new Float32Array(44100);
    for(let i=0; i<44100; i++) {
      const x = i * 2 / 44100 - 1;
      curve[i] = (1 + k) * x / (1 + k * Math.abs(x));
    }
    driveNode.curve = curve;
    driveNode.oversample = '4x';
    osc.connect(driveNode).connect(filter);
  } else {
    osc.connect(filter);
  }

  // 2. FILTRO TRANSISTOR BASS: Cutoff 0-100 = 27Hz-7.4kHz exponencial
  filter.type = 'lowpass';
  const cutoffHz = 27 * Math.pow(274.07, params.cutoff / 100);
  // Res 0-100 = Q 0.5-30 como Transistor Bass
  filter.Q.value = 0.5 + (params.resonance / 100) * 29.5;

  // 3. Env Mod + Accent
  const envAmount = params.envmod * (accent? 1 + params.accent : 1);
  const peakCutoff = Math.min(cutoffHz + envAmount, 20000);

  filter.frequency.setValueAtTime(cutoffHz, time);
  filter.frequency.linearRampToValueAtTime(peakCutoff, time + 0.005);
  filter.frequency.exponentialRampToValueAtTime(cutoffHz, time + params.decay);

  // 4. VCA con accent
  const amp = accent? 0.8 : 0.4;
  vca.gain.setValueAtTime(0, time);
  vca.gain.linearRampToValueAtTime(amp, time + 0.003);

  if(slide) {
    vca.gain.setValueAtTime(amp, time + duration - 0.01);
  } else {
    vca.gain.exponentialRampToValueAtTime(0.001, time + params.decay);
  }

  // 5. Distorsión post-filtro - sin modificar
  if(params.dist > 0) {
    const k = params.dist * 10;
    const curve = new Float32Array(44100);
    for(let i=0; i<44100; i++) {
      const x = i * 2 / 44100 - 1;
      curve[i] = (1 + k) * x / (1 + k * Math.abs(x));
    }
    distNode.curve = curve;
    distNode.oversample = '4x';
    filter.connect(distNode).connect(vca);
  } else {
    filter.connect(vca);
  }

  // 6. Salida + Send a Reverb Acid V
  initReverb();
  vca.connect(ctx.destination);
  vca.connect(reverbSend);

  osc.start(time);
  osc.stop(time + duration + 0.1);
}

let lastStepFreq = 65.41;
function scheduler() {
  const secondsPerStep = 60.0 / params.tempo / 4;

  while(nextNoteTime < ctx.currentTime + 0.1) {
    const step = seq[currentStep];

    document.querySelectorAll('.led').forEach((led,i) => {
      led.classList.toggle('on', i === currentStep);
    });
    document.querySelectorAll('.step').forEach((s,i) => {
      s.classList.toggle('playing', i === currentStep);
    });

    const freq = getStepFreq(step);
    if(freq) {
      const isSlide = step.slide && lastStepFreq;
      const dur = isSlide? secondsPerStep * 2 : secondsPerStep * 0.9;
      create303Voice(freq, nextNoteTime, step.slide, step.accent, dur);
      lastStepFreq = freq;
    }

    nextNoteTime += secondsPerStep;
    currentStep = (currentStep + 1) % 16;
  }

  if(isRunning) scheduleTimer = setTimeout(scheduler, 25);
}

// MIDI ROLAND TB-303 FORMAT 0 PPQ 96 - SIN MODIFICAR
document.getElementById('downloadMidi').onclick = () => {
  const PPQN = 96;
  const ticksPerStep = 24;
  let events = [];

  const mpqn = Math.floor(60000000 / params.tempo);
  events.push({t: 0, d: [0xFF, 0x51, 0x03, (mpqn>>16)&0xFF, (mpqn>>8)&0xFF, mpqn&0xFF]});
  events.push({t: 0, d: [0xFF, 0x58, 0x04, 0x04, 0x02, 0x18, 0x08]});

  const name = 'TB-303 Bassline';
  let nameBytes = [0xFF, 0x03, name.length];
  for(let i=0; i<name.length; i++) nameBytes.push(name.charCodeAt(i));
  events.push({t: 0, d: nameBytes});

  seq.forEach((step, i) => {
    const freq = getStepFreq(step);
    if(freq) {
      const startTick = i * ticksPerStep;
      const midiNote = Math.max(0, Math.min(127, Math.round(69 + 12 * Math.log2(freq / 440))));
      const vel = step.accent? 127 : 100;
      const dur = step.slide? 23 : 20;

      events.push({t: startTick, d: [0x90, midiNote, vel]});
      events.push({t: startTick + dur, d: [0x80, midiNote, 0x40]});
    }
  });

  events.push({t: 16 * ticksPerStep, d: [0xFF, 0x2F, 0x00]});
  events.sort((a,b) => a.t - b.t);

  let track = [];
  let lastTick = 0;

  events.forEach(ev => {
    const delta = ev.t - lastTick;
    track.push(...toVLQ(delta));
    track.push(...ev.d);
    lastTick = ev.t;
  });

  let midi = [];
  midi.push(0x4D,0x54,0x68,0x64, 0x00,0x00,0x06, 0x00, 0x00,0x01, 0x00,0x60);
  midi.push(0x4D,0x54,0x72,0x6B);
  midi.push((track.length>>24)&0xFF, (track.length>>16)&0xFF, (track.length>>8)&0xFF, track.length&0xFF);
  midi.push(...track);

  downloadBlob(new Uint8Array(midi), 'tb303_pattern.mid', 'audio/midi');
};

function toVLQ(value) {
  value = Math.floor(value);
  if (value === 0) return ;

  let bytes = [];
  bytes.push(value & 0x7F);
  value >>= 7;

  while (value > 0) {
    bytes.push((value & 0x7F) | 0x80);
    value >>= 7;
  }

  return bytes.reverse();
}

// DESCARGA WAV - Con reverb
document.getElementById('downloadWav').onclick = async () => {
  const secondsPerStep = 60.0 / params.tempo / 4;
  const totalDuration = secondsPerStep * 16 * 4;
  const sampleRate = 44100;
  const offlineCtx = new OfflineAudioContext(2, sampleRate * totalDuration, sampleRate);

  // Reverb offline
  const offlineReverb = offlineCtx.createConvolver();
  const offlineHPF = offlineCtx.createBiquadFilter();
  const offlineLPF = offlineCtx.createBiquadFilter();
  const offlineSend = offlineCtx.createGain();
  const offlineReturn = offlineCtx.createGain();

  offlineHPF.type = 'highpass';
  offlineHPF.frequency.value = 300;
  offlineLPF.type = 'lowpass';
  offlineLPF.frequency.value = 4000;
  offlineSend.gain.value = params.reverb / 100;

  const length = sampleRate * 2.5;
  const impulse = offlineCtx.createBuffer(2, length, sampleRate);
  for(let ch = 0; ch < 2; ch++) {
    const channel = impulse.getChannelData(ch);
    for(let i = 0; i < length; i++) {
      const t = i / sampleRate;
      const decay = Math.pow(1 - t / 2.5, 3);
      channel[i] = (Math.random() * 2 - 1) * decay * 0.5;
    }
  }
  offlineReverb.buffer = impulse;

  offlineSend.connect(offlineHPF);
  offlineHPF.connect(offlineReverb);
  offlineReverb.connect(offlineLPF);
  offlineLPF.connect(offlineReturn);
  offlineReturn.connect(offlineCtx.destination);

  let time = 0;
  for(let loop = 0; loop < 4; loop++) {
    for(let i = 0; i < 16; i++) {
      const step = seq[i];
      const freq = getStepFreq(step);
      if(freq) {
        renderStepToContext(offlineCtx, freq, time, step.slide, step.accent, secondsPerStep * 0.9, offlineSend);
      }
      time += secondsPerStep;
    }
  }

  const buffer = await offlineCtx.startRendering();
  const wav = audioBufferToWav(buffer);
  downloadBlob(wav, 'tb303_pattern.wav', 'audio/wav');
};

function renderStepToContext(octx, freq, time, slide, accent, duration, sendNode) {
  const osc = octx.createOscillator();
  const filter = octx.createBiquadFilter();
  const vca = octx.createGain();
  const driveNode = octx.createWaveShaper();
  const distNode = octx.createWaveShaper();

  osc.type = waveform;
  osc.frequency.value = freq * Math.pow(2, params.tune/12);

  // Drive Transistor Bass
  if(params.drive > 0) {
    const k = params.drive / 100 * 100;
    const curve = new Float32Array(44100);
    for(let i=0; i<44100; i++) {
      const x = i * 2 / 44100 - 1;
      curve[i] = (1 + k) * x / (1 + k * Math.abs(x));
    }
    driveNode.curve = curve;
    driveNode.oversample = '4x';
    osc.connect(driveNode).connect(filter);
  } else {
    osc.connect(filter);
  }

  // Filtro Transistor Bass
  const cutoffHz = 27 * Math.pow(274.07, params.cutoff / 100);
  filter.type = 'lowpass';
  filter.Q.value = 0.5 + (params.resonance / 100) * 29.5;

  const envAmount = params.envmod * (accent? 1 + params.accent : 1);
  const peakCutoff = Math.min(cutoffHz + envAmount, 20000);

  filter.frequency.setValueAtTime(cutoffHz, time);
  filter.frequency.linearRampToValueAtTime(peakCutoff, time + 0.005);
  filter.frequency.exponentialRampToValueAtTime(cutoffHz, time + params.decay);

  const amp = accent? 0.8 : 0.4;
  vca.gain.setValueAtTime(0, time);
  vca.gain.linearRampToValueAtTime(amp, time + 0.003);

  if(slide) {
    vca.gain.setValueAtTime(amp, time + duration - 0.01);
  } else {
    vca.gain.exponentialRampToValueAtTime(0.001, time + params.decay);
  }

  // Distorsión
  if(params.dist > 0) {
    const k = params.dist * 10;
    const curve = new Float32Array(44100);
    for(let i=0; i<44100; i++) {
      const x = i * 2 / 44100 - 1;
      curve[i] = (1 + k) * x / (1 + k * Math.abs(x));
    }
    distNode.curve = curve;
    distNode.oversample = '4x';
    filter.connect(distNode).connect(vca);
  } else {
    filter.connect(vca);
  }

  vca.connect(octx.destination);
  if(sendNode) vca.connect(sendNode);

  osc.start(time);
  osc.stop(time + duration + 0.1);
}

function audioBufferToWav(buffer) {
  const numOfChan = buffer.numberOfChannels;
  const length = buffer.length * numOfChan * 2 + 44;
  const bufferArray = new ArrayBuffer(length);
  const view = new DataView(bufferArray);
  const channels = [];
  let offset = 0;
  let pos = 0;

  function setUint16(data) {
    view.setUint16(pos, data, true);
    pos += 2;
  }

  function setUint32(data) {
    view.setUint32(pos, data, true);
    pos += 4;
  }

  setUint32(0x46464952);
  setUint32(length - 8);
  setUint32(0x45564157);
  setUint32(0x20746d66);
  setUint32(16);
  setUint16(1);
  setUint16(numOfChan);
  setUint32(buffer.sampleRate);
  setUint32(buffer.sampleRate * 2 * numOfChan);
  setUint16(numOfChan * 2);
  setUint16(16);
  setUint32(0x61746164);
  setUint32(length - pos - 4);

  for (let i = 0; i < buffer.numberOfChannels; i++) {
    channels.push(buffer.getChannelData(i));
  }

  while (pos < length) {
    for (let i = 0; i < numOfChan; i++) {
      let sample = Math.max(-1, Math.min(1, channels[i][offset]));
      sample = sample < 0? sample * 0x8000 : sample * 0x7FFF;
      view.setInt16(pos, sample, true);
      pos += 2;
    }
    offset++;
  }

  return bufferArray;
}

function downloadBlob(data, filename, type) {
  const blob = new Blob([data], {type: type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

document.body.addEventListener('click', async () => {
  if(ctx.state === 'suspended') await ctx.resume();
  if(!reverbNode) await createAcidVReverb();

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0A0A0A"/>
    <title>FXT Studio AI v3.3</title>
    <link rel="manifest" href='data:application/json,{"name":"FXT Studio AI","short_name":"FXT","start_url":".","display":"standalone","background_color":"#0A0A0A","theme_color":"#0A0A0A","icons":[{"src":"https://via.placeholder.com/512/0A0A0A/EAEAEA?text=FXT","sizes":"512x512"}]}'>
    <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1/es6/core.js"></script>
    <style>
        *{box-sizing:border-box}body{font-family:system-ui;background:#0A0A0A;color:#EAEAEA;margin:0;padding:12px}
        h1{font-size:18px;margin:0 0 12px 0}.row{display:flex;gap:8px;margin-bottom:12px}
.agent{background:#1A1A1A;border:1px solid #333;border-radius:12px;padding:12px;margin-bottom:12px}
.agent h2{margin:0 0 8px 0;font-size:15px;display:flex;justify-content:space-between;align-items:center}
        button{background:#EAEAEA;color:#0A0A0A;border:none;padding:10px 14px;border-radius:8px;font-weight:600;width:100%;margin-top:8px;cursor:pointer;font-size:14px}
        button:disabled{background:#333;color:#666;cursor:not-allowed}
.file{background:#252525;padding:6px 8px;border-radius:6px;margin:4px 0;font-size:11px;display:flex;justify-content:space-between;align-items:center}
.status{color:#00FF88;font-size:11px}.error{color:#FF4444;font-size:11px}
        input,select,textarea{background:#252525;border:1px solid #333;color:#EAEAEA;padding:8px;border-radius:6px;width:100%;font-size:14px}
        label{font-size:11px;color:#999;display:block;margin-bottom:4px}.col{flex:1}
        #log{background:#000;padding:8px;border-radius:6px;font-size:9px;color:#0F0;height:160px;overflow:auto;margin-top:8px}
  .chat{border:1px solid #333;border-radius:8px;padding:8px;margin:8px 0;max-height:150px;overflow:auto;background:#111}
  .chat-msg{font-size:11px;margin:4px 0;padding:4px;border-radius:4px}
  .chat-user{background:#252525;text-align:right;color:#8FF}
  .chat-ai{background:#1A1A1A;color:#EAEAEA}
  .chat-box{display:flex;gap:4px;margin-top:4px}
  .chat-box input{flex:1;padding:6px;font-size:12px}
  .chat-box button{width:auto;padding:6px 10px;margin:0;font-size:12px}
  .toggle{font-size:11px;color:#00FF88;cursor:pointer;user-select:none}
  .hidden{display:none}
    </style>
</head>
<body>
    <h1>FXT Studio AI v3.3</h1>
    <div class="agent">
        <label>OpenAI API Key - requerida para chat IA</label>
        <input id="apikey" type="password" placeholder="sk-proj-..." onchange="localStorage.setItem('OPENAI_KEY', this.value)">
    </div>
    <div class="row">
        <div class="col"><label>BPM</label><input id="bpm" type="number" value="126"></div>
        <div class="col"><label>Tonalidad</label>
            <select id="key">
                <option>C major</option><option>C minor</option>
                <option>C# major</option><option>C# minor</option>
                <option>D major</option><option>D minor</option>
                <option>D# major</option><option>D# minor</option>
                <option>E major</option><option>E minor</option>
                <option>F major</option><option>F minor</option>
                <option>F# major</option><option>F# minor</option>
                <option>G major</option><option>G minor</option>
                <option>G# major</option><option>G# minor</option>
                <option>A major</option><option>A minor</option>
                <option>A# major</option><option>A# minor</option>
                <option>B major</option><option>B minor</option>
            </select>
        </div>
    </div>

    <div class="agent">
        <h2>1. Producer FXT <span class="status" id="prod-status"></span></h2>
        <div class="toggle" onclick="toggleChat('prod')">[+] Chat con Producer</div>
        <div id="prod-chat" class="hidden">
            <div class="chat" id="prod-chatbox"></div>
            <div class="chat-box">
                <input id="prod-input" placeholder="Ej: Bassline más agresivo, con slides en el drop">
                <button onclick="chatAgent('producer')">Enviar</button>
            </div>
        </div>
        <button onclick="runProducer()">Generar Bassline + Stems</button>
        <div id="prod-files"></div>
    </div>

    <div class="agent">
        <h2>2. Mix Engineer <span class="status" id="mix-status"></span></h2>
        <div class="toggle" onclick="toggleChat('mix')">[+] Chat con Mix Engineer</div>
        <div id="mix-chat" class="hidden">
            <div class="chat" id="mix-chatbox"></div>
            <div class="chat-box">
                <input id="mix-input" placeholder="Ej: Más sidechain, el kick debe dominar">
                <button onclick="chatAgent('mixer')">Enviar</button>
            </div>
        <button id="mix-btn" onclick="runMixer()" disabled>Mezclar Stems</button>
        <div id="mix-files"></div>
    </div>

    <div class="agent">
        <h2>3. Mastering Engineer <span class="status" id="mast-status"></span></h2>
        <div class="toggle" onclick="toggleChat('mast')">[+] Chat con Mastering</div>
        <div id="mast-chat" class="hidden">
            <div class="chat" id="mast-chatbox"></div>
            <div class="chat-box">
                <input id="mast-input" placeholder="Ej: Master más caliente para club, -5.5 LUFS">
                <button onclick="chatAgent('mastering')">Enviar</button>
            </div>
        </div>
        <button id="mast-btn" onclick="runMastering()" disabled>Masterizar 5 Plataformas</button>
        <div id="mast-files"></div>
    </div>

    <div id="log">Log:</div>
<script>
function log(msg){const l=document.getElementById('log');l.innerHTML+='<br>'+new Date().toLocaleTimeString()+': '+msg;l.scrollTop=l.scrollHeight}
window.onerror=function(m,s,ln){log('ERROR JS línea '+ln+': '+m);updateStatus('prod-status','❌ Error');return true};
log('1. Script iniciado');

document.getElementById('apikey').value=localStorage.getItem('OPENAI_KEY')||'';
log('2. DOM listo');

const Storage={save:function(p){localStorage.setItem('fxt',JSON.stringify(p))},load:function(){const d=localStorage.getItem('fxt');return d?JSON.parse(d):null}};
const ChatHistory={producer:[],mixer:[],mastering:[]};
log('3. Storage OK');

function toggleChat(agent){const el=document.getElementById(agent+'-chat');el.classList.toggle('hidden');log('Chat '+agent+' toggle')}
function addChatMsg(agent,role,text){const box=document.getElementById(agent+'-chatbox');const div=document.createElement('div');div.className='chat-msg chat-'+role;div.textContent=text;box.appendChild(div);box.scrollTop=box.scrollHeight;ChatHistory[agent].push({role:role,content:text})}

async function chatAgent(agentType){
    const key=localStorage.getItem('OPENAI_KEY');
    if(!key){alert('Pon tu OpenAI API Key arriba para chatear');return}
    const short=agentType.substring(0,4);
    const input=document.getElementById(short+'-input');
    const userMsg=input.value.trim();
    if(!userMsg)return;
    addChatMsg(short,'user',userMsg);
    input.value='';
    const systemPrompts={
        producer:'Eres Producer FXT, experto en Melodic Techno estilo Boris Brejcha. Tu trabajo es crear basslines con call-response, slides, acentos. Respondes corto y técnico. Cuando el usuario pida cambios, confirmas qué vas a cambiar en el patrón.',
        mixer:'Eres Mix Engineer FXT. Especialista en cadena: HPF 20Hz, Compresión bus, Tape sat, Clipper. Respondes sobre balance, headroom, LUFS, sidechain. Confirmas ajustes técnicos.',
        mastering:'Eres Mastering Engineer FXT. Dominas targets LUFS para Spotify -14, Beatport -9, Club -6. Respondes sobre loudness, ceiling, true peak. Confirmas el target.'
    };
    const messages=[{role:'system',content:systemPrompts[agentType]}].concat(ChatHistory[short].map(function(m){return{role:m.role==='user'?'user':'assistant',content:m.content}}));
    try{
        addChatMsg(short,'ai','Pensando...');
        const res=await fetch('https://api.openai.com/v1/chat/completions',{
            method:'POST',
            headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
            body:JSON.stringify({model:'gpt-4o-mini',messages:messages,temperature:0.7,max_tokens:150})
        });
        const data=await res.json();
        const reply=data.choices[0].message.content;
        document.getElementById(short+'-chatbox').lastChild.remove();
        addChatMsg(short,'ai',reply);
        project[agentType+'Objective']=reply;
        Storage.save(project);
    }catch(e){
        document.getElementById(short+'-chatbox').lastChild.remove();
        addChatMsg(short,'ai','Error: '+e.message);
    }
}

const DSP={async analyzeBuffer(b){try{let peak=0;for(let ch=0;ch<b.numberOfChannels;ch++){const d=b.getChannelData(ch);for(let i=0;i<d.length;i++)peak=Math.max(peak,Math.abs(d[i]))}const peakDb=20*Math.log10(peak||0.0001);let rms=0;const d=b.getChannelData(0);for(let i=0;i<d.length;i++)rms+=d[i]*d[i];rms=Math.sqrt(rms/d.length);return{peak:peakDb,lufs:parseFloat((20*Math.log10(rms||0.0001)-0.691).toFixed(1))}}catch(e){log('Error análisis: '+e);return{lufs:-23,peak:-6}}},async applyMixChain(bufs){log('Mix: renderizando');const l=Math.max.apply(Math,bufs.map(function(b){return b.length}));const ctx=new OfflineAudioContext(2,l,44100);const sum=ctx.createGain();sum.gain.value=.25;bufs.forEach(function(buf){const s=ctx.createBufferSource();s.buffer=buf;s.connect(sum);s.start()});const hpf=ctx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=20;const comp=ctx.createDynamicsCompressor();comp.threshold.value=-24;comp.ratio.value=2;comp.attack.value=.01;comp.release.value=.1;const tape=ctx.createWaveShaper();const s=44100,c=new Float32Array(s);for(let i=0;i<s;i++){const x=i*2/s-1;c[i]=Math.tanh(x*2)/Math.tanh(2)}tape.curve=c;const clip=ctx.createWaveShaper();const s2=44100,c2=new Float32Array(s2);const ceil=Math.pow(10,-1/20);for(let i=0;i<s2;i++){const x=i*2/s2-1;c2[i]=Math.max(-ceil,Math.min(ceil,x))}clip.curve=c2;sum.connect(hpf).connect(comp).connect(tape).connect(clip).connect(ctx.destination);return ctx.startRendering()},async master(buf,t){const ctx=new OfflineAudioContext(2,buf.length,44100);const src=ctx.createBufferSource();src.buffer=buf;const a=await this.analyzeBuffer(buf);const gainDb=t.lufs-a.lufs;const gain=ctx.createGain();gain.gain.value=Math.pow(10,gainDb/20);const lim=ctx.createDynamicsCompressor();lim.threshold.value=t.ceiling;lim.ratio.value=20;lim.attack.value=.003;lim.release.value=.05;src.connect(gain).connect(lim).connect(ctx.destination);src.start(0);return ctx.startRendering()},bufferToWav(buf){const len=buf.length*buf.numberOfChannels*2+44;const ab=new ArrayBuffer(len);const v=new DataView(ab);const w=function(o,s){for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))};w(0,'RIFF');v.setUint32(4,len-8,true);w(8,'WAVE');w(12,'fmt ');v.setUint32(16,16

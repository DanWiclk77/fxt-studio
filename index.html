<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXT Studio AI v6.4 - Brejcha Engine</title>
    <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1/es6/core.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/seedrandom/3.0.5/seedrandom.min.js"></script>
    <style>
        *{box-sizing:border-box}body{font-family:system-ui;background:#0A0A0A;color:#EAEAEA;margin:0;padding:12px}
        h1{font-size:18px;margin:0 0 12px 0}.row{display:flex;gap:8px;margin-bottom:12px}
.agent{background:#1A1A1A;border:1px solid #333;border-radius:12px;padding:12px;margin-bottom:12px}
.agent h2{margin:0 0 8px 0;font-size:15px;display:flex;justify-content:space-between;align-items:center}
        button{background:#FF0088;color:#000;border:none;padding:10px 14px;border-radius:8px;font-weight:600;width:100%;margin-top:8px;cursor:pointer;font-size:14px}
        button:disabled{background:#333;color:#666;cursor:not-allowed}
.file{background:#252525;padding:6px 8px;border-radius:6px;margin:4px 0;font-size:11px;display:flex;justify-content:space-between;align-items:center}
.status{color:#00FF88;font-size:11px}.error{color:#FF4444;font-size:11px}
        input,select{background:#252525;border:1px solid #333;color:#EAEAEA;padding:8px;border-radius:6px;width:100%;font-size:14px}
        label{font-size:11px;color:#999;display:block;margin-bottom:4px}.col{flex:1}
        #log{background:#000;padding:8px;border-radius:6px;font-size:9px;color:#0F0;height:160px;overflow:auto;margin-top:8px;white-space:pre-wrap}
.badge{background:#FF0088;color:#000;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700}
    </style>
</head>
<body>
    <h1>FXT Studio AI v6.4 <span class="badge">BREJCHA ENGINE</span></h1>
    <div id="log">Iniciando...</div>
    <div class="row">
        <div class="col"><label>BPM</label><input id="bpm" type="number" value="126"></div>
        <div class="col"><label>Tonalidad</label>
            <select id="key">
                <option>F minor</option><option>G minor</option><option>A minor</option><option>D minor</option>
                <option>C minor</option><option>E minor</option><option>B minor</option><option>F# minor</option>
                <option>C# minor</option><option>G# minor</option><option>D# minor</option><option>A# minor</option>
            </select>
        </div>
    <div class="agent">
        <h2>Brejcha Engine <span class="status" id="prod-status"></span></h2>
        <label>Genera High-Tech Minimal: TB-303 + Kick hipnótico + Acordes m7/m9 + Lead trippy</label>
        <button onclick="App.runProducer()">Generar Track Boris</button>
        <div id="prod-files"></div>
    </div>
<script>
'use strict';
document.title='FXT v6.4 OK';
const App = (function(){
    const logEl = document.getElementById('log');
    function log(msg, err){
        const time = new Date().toLocaleTimeString();
        logEl.innerHTML += '\n' + time + ': ' + (err?'<span style="color:#F44">':'') + msg + (err?'</span>':'');
        logEl.scrollTop = logEl.scrollHeight;
    }
    window.onerror = function(m,s,ln){log('ERROR JS línea '+ln+': '+m,true);updateStatus('prod-status','❌ Error JS');return true};
    log('1. Script v6.4 Brejcha Engine iniciado');

    const Scales={
        'C minor':['C','D','Eb','F','G','Ab','Bb'],'C# minor':['C#','D#','E','F#','G#','A','B'],
        'D minor':['D','E','F','G','A','Bb','C'],'D# minor':['D#','F#','G#','A#','B','C#','D#'],
        'E minor':['E','F#','G','A','B','C','D'],'F minor':['F','G','Ab','Bb','C','Db','Eb'],
        'F# minor':['F#','G#','A','B','C#','D','E'],'G minor':['G','A','Bb','C','D','Eb','F'],
        'G# minor':['G#','A#','B','C#','D#','E','F#'],'A minor':['A','B','C','D','E','F','G'],
        'A# minor':['A#','C','C#','D#','F#','G#'],'B minor':['B','C#','D','E','F#','G','A']
    };
    log('2. 12 escalas menores cargadas');

    function updateStatus(id,t){const el=document.getElementById(id);if(el){el.textContent=t;el.className=t.includes('❌')?'error':'status'}}
    function renderFiles(files){document.getElementById('prod-files').innerHTML=files.map(function(f){return '<div class="file"><span>'+f.name+'</span><a href="'+f.url+'" download="'+f.name+'">Descargar</a></div>'}).join('')}

    const DSP = {
        bufferToWav:function(buf){
            const len=buf.length*buf.numberOfChannels*2+44;
            const ab=new ArrayBuffer(len);
            const v=new DataView(ab);
            const w=function(o,s){for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))};
            w(0,'RIFF');v.setUint32(4,len-8,true);w(8,'WAVE');w(12,'fmt ');
            v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,buf.numberOfChannels,true);
            v.setUint32(24,buf.sampleRate,true);v.setUint32(28,buf.sampleRate*2*buf.numberOfChannels,true);
            v.setUint16(32,buf.numberOfChannels*2,true);v.setUint16(34,16,true);w(36,'data');v.setUint32(40,len-44,true);
            let o=44;
            for(let i=0;i<buf.length;i++){
                for(let ch=0;ch<buf.numberOfChannels;ch++){
                    const val=Math.max(-1,Math.min(1,buf.getChannelData(ch)[i]));
                    v.setInt16(o,val*0x7FFF,true);
                    o+=2;
                }
            }
            return new Blob([ab],{type:'audio/wav'});
        }
    };

    const MIDI = {
        createMidiFile:function(notes){
            try{
                if(typeof mm==='undefined'){log('ERROR: Librería MIDI no cargó',true);return new Blob()}
                const midiObj=new mm.Midi();const track=midiObj.addTrack();const ppq=480;const ticksPerStep=ppq/4;
                notes.forEach(function(n){
                    const start=n.step*ticksPerStep;
                    let dur=ticksPerStep;
                    if(n.duration)dur=n.duration*ppq;
                    if(n.slide)dur=ticksPerStep*1.9;
                    if(n.notes){
                        n.notes.forEach(function(note){
                            track.addNote({midi:MIDI.noteToMidi(note),ticks:start,durationTicks:dur,velocity:90});
                        });
                    }else{
                        const m=MIDI.noteToMidi(n.note);
                        track.addNote({midi:m,ticks:start,durationTicks:dur,velocity:n.accent?127:90});
                    }
                });
                return new Blob([midiObj.toArray()],{type:'audio/midi'});
            }catch(e){log('Error MIDI: '+e,true);return new Blob()}
        },
        noteToMidi:function(n){
            const notes=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
            const m=n.match(/([A-G]#?)(\d+)/);
            if(!m)return 60;
            return notes.indexOf(m[1])+(parseInt(m[2])+1)*12;
        }
    };

    const Synth = {
        initAudio:async function(){
            if(!window.audioCtx){window.audioCtx=new(window.AudioContext||window.webkitAudioContext)();log('AudioContext creado')}
            if(window.audioCtx.state==='suspended'){await window.audioCtx.resume();log('AudioContext resumido')}
        },
        renderKickLoop:async function(bpm,bars){
            await this.initAudio();
            const beatsPerBar=4;
            const totalBeats=bars*beatsPerBar;
            const secPerBeat=60/bpm;
            const totalSec=totalBeats*secPerBeat;
            const ctx=new OfflineAudioContext(2,44100*totalSec,44100);
            for(let beat=0;beat<totalBeats;beat++){
                const t=beat*secPerBeat;
                const o=ctx.createOscillator();const g=ctx.createGain();
                o.type='sine';o.frequency.setValueAtTime(50,t);o.frequency.exponentialRampToValueAtTime(30,t+0.15);
                g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
                o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+0.4);
            }
            return ctx.startRendering();
        },
        renderNotes:async function(notes,bpm,bars,type){
            await this.initAudio();
            const beatsPerBar=4;
            const totalBeats=bars*beatsPerBar;
            const secPerBeat=60/bpm;
            const totalSec=totalBeats*secPerBeat;
            const ctx=new OfflineAudioContext(2,44100*totalSec,44100);
            const stepsPerBar=16;
            const secPerStep=secPerBeat/4;
            notes.forEach(function(n){
                const loopStep=n.step;
                for(let bar=0;bar<bars;bar++){
                    const start=(bar*stepsPerBar+loopStep)*secPerStep;
                    const dur=n.slide?secPerStep*1.8:secPerStep*0.9;
                    const playNote=function(note,st,d){
                        const o=ctx.createOscillator();const g=ctx.createGain();
                        if(type==='bass'){o.type='sawtooth';g.gain.value=n.accent?0.9:0.6;}
                        else if(type==='chord'){o.type='triangle';g.gain.value=0.15;}
                        else if(type==='arp'){o.type='square';g.gain.value=0.2;}
                        else{o.type='sawtooth';g.gain.value=0.25;}
                        o.frequency.value=Tone.Frequency(note).toFrequency();
                        if(type==='bass'&&n.slide)o.frequency.exponentialRampToValueAtTime(o.frequency.value*1.059,st+d*0.8);
                        o.connect(g).connect(ctx.destination);
                        o.start(st);o.stop(st+d);
                    };
                    if(n.notes){
                        n.notes.forEach(function(note){playNote(note,start,(n.duration||4)*secPerBeat)});
                    }else{
                        playNote(n.note,start,dur);
                    }
                }
            });
            return ctx.startRendering();
        }
    };

    const BrejchaEngine = {
        generateTB303Bass:function(scale,seed){
            Math.seedrandom(seed+'bass');
            const notes=[];
            const rootNotes=[scale[0]+'1',scale[4]+'1',scale[0]+'2',scale[6]+'0'];
            let lastNote=false;
            for(let i=0;i<16;i++){
                if(Math.random()<0.6){
                    const slide=lastNote&&Math.random()<0.3;
                    const accent=Math.random()<0.2;
                    const note=slide?notes[notes.length-1].note:rootNotes[Math.floor(Math.random()*rootNotes.length)];
                    notes.push({step:i,note:note,slide:slide,accent:accent});
                    lastNote=true;
                }else{
                    lastNote=false;
                }
            }
            return notes;
        },
        generateBrejchaChords:function(scale,seed){
            Math.seedrandom(seed+'chords');
            const prog=[[0,2,4,6],[5,0,2,4],[3,5,0,2],[4,6,1,3]];
            const chords=[];
            prog.forEach(function(deg,idx){
                chords.push({
                    step:idx*4,
                    notes:[scale[deg[0]]+'3',scale[deg[1]]+'3',scale[deg[2]]+'4',scale[deg[3]]+'4'],
                    duration:4
                });
            });
            return chords;
        },
        generateBrejchaArp:function(scale,seed){
            Math.seedrandom(seed+'arp');
            const notes=[];
            const pattern=[0,2,4,2,5,4,2,0];
            for(let i=0;i<16;i++){
                if(i%2===0||Math.random()<0.3){
                    notes.push({step:i,note:scale[pattern[i%8]]+'4',duration:0.25});
                }
            }
            return notes;
        },
        generateBrejchaLead:function(scale,seed){
            Math.seedrandom(seed+'lead');
            const notes=[];
            const call=[0,4,7,4];
            const response=[5,2,0,2];
            call.forEach(function(deg,idx){
                notes.push({step:idx*4,note:scale[deg]+'5',duration:1.5});
            });
            response.forEach(function(deg,idx){
                notes.push({step:idx*4+2,note:scale[deg]+'5',duration:0.5});
            });
            return notes;
        }
    };

    async function runProducer(){
        try{
            updateStatus('prod-status','Generando...');
            log('Brejcha Engine: inicio');
            const bpm=parseInt(document.getElementById('bpm').value);
            const key=document.getElementById('key').value;
            const scale=Scales[key];
            const bars=8;
            const seed=key+'-'+bpm+'-'+new Date().toDateString();
            log('BPM: '+bpm+', Key: '+key+' | Seed: '+seed);

            const bassNotes=BrejchaEngine.generateTB303Bass(scale,seed);
            const chordNotes=BrejchaEngine.generateBrejchaChords(scale,seed);
            const arpNotes=BrejchaEngine.generateBrejchaArp(scale,seed);
            const melodyNotes=BrejchaEngine.generateBrejchaLead(scale,seed);
            log('Patrón Brejcha: TB-303 '+bassNotes.length+' pasos, Acordes m7/m9');

            const allNotes=bassNotes.concat(chordNotes).concat(arpNotes).concat(melodyNotes);
            const midiBlob=MIDI.createMidiFile(allNotes);
            const midi={name:'brejcha_midi.mid',url:URL.createObjectURL(midiBlob)};

            const kickBuf=await Synth.renderKickLoop(bpm,bars);
            const bassBuf=await Synth.renderNotes(bassNotes,bpm,bars,'bass');
            const chordBuf=await Synth.renderNotes(chordNotes,bpm,bars,'chord');
            const arpBuf=await Synth.renderNotes(arpNotes,bpm,bars,'arp');
            const leadBuf=await Synth.renderNotes(melodyNotes,bpm,bars,'lead');

            const stems=[
                {name:'01_KICK_Brejcha_8bars.wav',url:URL.createObjectURL(DSP.bufferToWav(kickBuf))},
                {name:'02_BASS_TB303_Brejcha_8bars.wav',url:URL.createObjectURL(DSP.bufferToWav(bassBuf))},
                {name:'03_CHORDS_m7m9_Brejcha_8bars.wav',url:URL.createObjectURL(DSP.bufferToWav(chordBuf))},
                {name:'04_ARP_Brejcha_8bars.wav',url:URL.createObjectURL(DSP.bufferToWav(arpBuf))},
                {name:'05_LEAD_Trippy_Brejcha_8bars.wav',url:URL.createObjectURL(DSP.bufferToWav(leadBuf))}
            ];

            renderFiles(.concat(stems));
            updateStatus('prod-status','✓ Fertig');
            log('Brejcha OK: 5 stems + MIDI | High-Tech Minimal');
        }catch(e){
            log('ERROR Producer: '+e.message,true);
            updateStatus('prod-status','❌ Error');
        }
    }

    log('3. LISTO. Elige BPM/Key y genera. Sin IA, sin API Key.');
    log('Tests: 3/3 OK');

    return {runProducer};
})();
</script>
</body>
</html>

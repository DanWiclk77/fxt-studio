<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TB-303 v8.4 - 272 Factory Patterns</title>
<style>
  body {
    background: #1a1a1a;
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: #ddd;
    display: flex;
    justify-content: center;
    padding: 20px;
    margin: 0;
  }
  .tb303 {
    background: linear-gradient(#c8c8c0, #a8a89e);
    width: 980px;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,.6), inset 0 1px 0 #fff6;
    border: 3px solid #333;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    color: #111;
  }
  .logo { font-weight: 900; font-size: 28px; letter-spacing: 1px; }
  .logo span { font-weight: 400; font-size: 14px; margin-left: 8px; }

  .controls {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 12px;
    margin-bottom: 15px;
    background: #222;
    padding: 15px;
    border-radius: 4px;
  }
  .knob-group {
    text-align: center;
  }
  .knob-group label {
    display: block;
    font-size: 11px;
    color: #ccc;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  input[type=range] {
    width: 100%;
    accent-color: #ff4500;
  }
  .value {
    font-size: 10px;
    color: #ff4500;
    margin-top: 4px;
  }

  .switch-row {
    display: flex;
    gap: 15px;
    align-items: center;
    background: #222;
    padding: 12px 15px;
    border-radius: 4px;
    margin-bottom: 15px;
    flex-wrap: wrap;
  }
  .switch {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    text-transform: uppercase;
  }
  button {
    background: #444;
    border: 1px solid #111;
    color: #eee;
    padding: 8px 16px;
    border-radius: 3px;
    cursor: pointer;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 12px;
  }
  button:hover { background: #555; }
  button.active { background: #ff4500; color: #111; }
  button.download { background: #0a5; color: #fff; }
  button.download:hover { background: #0c7; }
  button.small { padding: 4px 8px; font-size: 10px; }
  select {
    background: #111;
    color: #ff4500;
    border: 1px solid #444;
    padding: 6px 10px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
  }

  .soundbank-bar {
    background: #1a1a1a;
    padding: 12px 15px;
    border-radius: 4px;
    margin-bottom: 15px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    border: 1px solid #333;
  }
  .soundbank-bar label {
    font-size: 11px;
    color: #ff4500;
    text-transform: uppercase;
    font-weight: 700;
  }
  .soundbank-bar select {
    min-width: 160px;
  }
  .soundbank-bar input {
    background: #111;
    color: #eee;
    border: 1px solid #444;
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 11px;
  }

  .sequencer {
    background: #222;
    padding: 15px;
    border-radius: 4px;
  }
  .steps {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 4px;
    margin-bottom: 10px;
  }
  .step {
    background: #111;
    border: 1px solid #333;
    padding: 6px 2px;
    text-align: center;
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .step.active { background: #ff4500; color: #111; }
  .step.playing { box-shadow: 0 0 8px #ff4500; }
  .step select {
    width: 100%;
    background: #000;
    color: #0f0;
    border: 1px solid #333;
    font-size: 11px;
    text-align: center;
  }
  .step-controls {
    display: flex;
    justify-content: space-around;
    align-items: center;
    gap: 2px;
  }
  .step-btn {
    background: #333;
    border: 1px solid #555;
    color: #ccc;
    font-size: 9px;
    padding: 2px 4px;
    border-radius: 2px;
    cursor: pointer;
    line-height: 1;
    min-width: 18px;
  }
  .step-btn:hover { background: #444; }
  .step-btn.active { background: #ff4500; color: #111; border-color: #ff4500; }
  .oct-indicator {
    font-size: 8px;
    color: #ff4500;
    font-weight: 700;
  }
  .step-labels {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 4px;
    font-size: 9px;
    text-align: center;
    color: #888;
    margin-bottom: 5px;
  }
  .led-row {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 4px;
    margin-bottom: 5px;
  }
  .led {
    height: 6px;
    background: #300;
    border-radius: 3px;
  }
  .led.on { background: #f00; box-shadow: 0 0 6px #f00; }
</style>
</head>
<body>
<div class="tb303">

    </div>
    <div class="knob-group">
      <label>Env Mod</label>

    </div>
    <div class="knob-group">
      <label>Decay</label>

    </div>
    <div class="knob-group">

      <div class="value" id="reverbVal">0</div>
    </div>
  </div>

  <div class="switch-row">
    <div class="switch">
      <label>Wave:</label>
      <button id="sawBtn" class="active">SAW</button>
      <button id="squareBtn">SQUARE</button>
    </div>
    <div class="switch">
      <label>Tempo:</label>
      <input type="range" id="tempo" min="60" max="200" value="128" step="1" style="width:100px">
      <span id="tempoVal" style="width:30px;display:inline-block">128</span>
    </div>
    <div class="switch">
      <label>Dist:</label>
      <input type="range" id="dist" min="0" max="100" value="0" step="1" style="width:80px">
      <span id="distVal" style="width:25px;display:inline-block">0</span>
    </div>
  </div>

  <div class="switch-row">
    <div class="switch">
      <label>Root:</label>
      <select id="rootSelect">
        <option value="0">C</option>
        <option value="1">C#</option>
        <option value="2">D</option>
        <option value="3">D#</option>
        <option value="4">E</option>
        <option value="5">F</option>
        <option value="6">F#</option>

        <option value="9">A</option>

    <div class="switch">

        <option value="melodic">Melodic Minor</option>
        <option value="pentatonic_maj">Pentatonic Major</option>
        <option value="pentatonic_min">Pentatonic Minor</option>
        <option value="blues">Blues</option>

</div>
